# Workflow for building and deploying the static spec to GitHub Pages.
#
# The build step renders valos-spec.html via the ReSpec CLI (headless Chrome),
# replaces external W3C asset references with locally vendored copies, and
# rewrites the Content-Security-Policy meta tag to use SHA-256 hashes of the
# inline scripts in place of 'unsafe-inline'. See scripts/build.mjs.
name: Deploy static content to Pages

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Pinned: Node 24.16.0 breaks extract-zip, so @puppeteer/browsers
          # leaves Chrome only partially extracted. 24.15.0 is the last good
          # release. https://github.com/nodejs/node/issues/63487
          node-version: '24.15.0'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install apparmor-utils
        run: sudo apt-get update && sudo apt-get install -y apparmor-utils
      - name: Build static spec
        # npm run build triggers prebuild (risk-reference validation +
        # vendored asset checksum verification) before scripts/build.mjs.
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
